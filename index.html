<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Workout"/>
<meta name="theme-color" content="#000000"/>
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    /* ── Core backgrounds — deep true dark ── */
    --bg:    #06050a;
    --bg2:   #080710;
    --bg3:   #0d0b14;
    --bg4:   #13101c;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    /* ── Text — crisp white scale ── */
    --text:   #f0eeff;
    --text2:  #a89ec8;
    --text3:  #6b5f8a;
    --text4:  #3d3558;
    /* ── Warm white ── */
    --warm-white: #f0eeff;
    /* ── Accent (set by stone JS) ── */
    --accent:      #c084fc;
    --accent-glow: rgba(192,132,252,0.55);
    --accent-dim:  rgba(192,132,252,0.12);
    /* ── Muscle group colors — vibrant & distinct ── */
    --c-back:      #38bdf8;  /* electric blue  */
    --c-chest:     #f472b6;  /* hot pink       */
    --c-legs:      #4ade80;  /* neon green     */
    --c-shoulders: #fb923c;  /* vivid orange   */
    --c-cardio:    #22d3ee;  /* cyan           */
    --c-recovery:  #a78bfa;  /* soft violet    */
    --c-core:      #facc15;  /* bright yellow  */
    --c-full:      #34d399;  /* emerald        */
    --c-hiit:      #f87171;  /* coral red      */
    --c-olympic:   #e879f9;  /* fuchsia        */
    --c-functional:#2dd4bf;  /* teal           */
    --c-sport:     #60a5fa;  /* sky blue       */
    /* ── Glow card ── */
    --glow-card: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background:
      radial-gradient(ellipse 120% 60% at 50% -5%,  #1a0a30 0%, transparent 55%),
      radial-gradient(ellipse 80% 45% at 5%   95%,  #0a0520 0%, transparent 50%),
      radial-gradient(ellipse 70% 40% at 95%  90%,  #150520 0%, transparent 50%),
      #06050a;
    background-attachment: fixed;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 65% 30% at 50%   0%,  rgba(192,132,252,0.11) 0%, transparent 60%),
      radial-gradient(ellipse 40% 22% at 5%  100%,  rgba(56,189,248,0.08)  0%, transparent 50%),
      radial-gradient(ellipse 35% 20% at 95%  90%,  rgba(244,114,182,0.07) 0%, transparent 50%),
      radial-gradient(ellipse 25% 18% at 85%  10%,  rgba(74,222,128,0.05)  0%, transparent 40%);
  }
  body::after { display: none; }
  #app { position: relative; z-index: 1; background: transparent; }
  .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.06em; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 2px; } ::-webkit-scrollbar-track { background: #06050a; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Glow effects */
  .glow-card { box-shadow: var(--glow-card); }
  .glow-text { text-shadow: 0 0 10px var(--accent-glow); }

  /* Layout */
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }

  /* Header */
  .header { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0 20px 18px; position: relative; overflow: hidden; }
  .header::before { display: none; }
  .header-title { font-size: clamp(28px,6.5vw,40px); color: #fff; margin-bottom: 14px; line-height: 1; font-weight: 800; letter-spacing: -0.02em; font-family: 'DM Sans', sans-serif; }

  /* Goal bars */
  .goal-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .goal-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 16px; padding: 10px 12px; transition: all 0.3s; }
  .goal-card:hover { border-color: var(--accent-glow); box-shadow: 0 0 20px var(--accent-dim); }
  .goal-val { font-size: 18px; color: #fff; margin: 3px 0 5px; }
  .goal-sub { font-size: 10px; color: var(--text4); margin-bottom: 5px; }
  .prog-bar { background: var(--bg4); border-radius: 99px; height: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.6s ease; }

  /* Stats row */
  .stats-row { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .stat-pill { font-size: 11px; color: rgba(255,255,255,0.4); }
  .stat-pill span { color: rgba(255,255,255,0.75); font-weight: 700; }

  /* Week control */
  .week-ctrl { display: flex; align-items: center; gap: 10px; padding: 16px 20px 0; }
  .week-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); border-radius: 8px; padding: 5px 14px; font-size: 20px; cursor: pointer; transition: all 0.15s; }
  .week-btn:hover { border-color: var(--accent-glow); color: var(--accent); }
  .week-num { font-size: 26px; color: var(--warm-white); min-width: 70px; text-align: center; }
  .phase-badge { background: var(--accent-dim); border: 1px solid var(--accent-glow); color: var(--accent); border-radius: 10px; padding: 5px 14px; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; }

  /* Tabs */
  .tabs { display: none; }
  .tab-btn { display: none; }

  /* Content */
  .content { padding: 14px 20px; }

  /* Cards */
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 16px 18px; margin-bottom: 10px; transition: border-color 0.2s; }
  .card.glowing { border-color: var(--accent-glow); box-shadow: 0 0 30px var(--accent-dim); }
  .card-title { font-size: 19px; color: #fff; margin-bottom: 14px; }

  /* Day tabs */
  .day-tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 4px; -ms-overflow-style: none; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; background: var(--bg3); color: var(--text3); border: 1px solid var(--border2); border-radius: 9px; padding: 7px 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .day-tab.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
  .day-tab.cardio.active  { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
  .day-tab.recovery.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }

  /* Block accordion */
  .block { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; margin-bottom: 10px; overflow: hidden; transition: all 0.2s; }
  .block.open { border-color: var(--border2); }
  .block-header { display: flex; align-items: center; padding: 13px 16px; cursor: pointer; gap: 10px; }
  .block-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text2); }
  .block-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .block-arrow { color: var(--text4); font-size: 12px; transition: transform 0.2s; }
  .block.open .block-arrow { transform: rotate(180deg); }
  .block-body { border-top: 1px solid var(--bg4); }

  /* Muscle group color overrides */
  .block.back.open    { border-color: rgba(96,165,250,0.3) !important; box-shadow: 0 0 16px rgba(96,165,250,0.06); }
  .block.chest.open   { border-color: rgba(248,113,113,0.3) !important; box-shadow: 0 0 16px rgba(248,113,113,0.06); }
  .block.legs.open    { border-color: rgba(74,222,128,0.3) !important; box-shadow: 0 0 16px rgba(74,222,128,0.06); }
  .block.shoulder.open { border-color: rgba(251,191,36,0.35) !important; box-shadow: 0 0 16px rgba(251,191,36,0.08); }

  /* ── Add Exercise Button ── */
  .add-ex-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: var(--accent-dim); border: 1px dashed var(--accent-glow); border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; margin: 10px 0 4px; font-family: 'DM Sans', sans-serif; }
  .add-ex-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
  .add-ex-btn:active { transform: scale(0.98); }

  /* ── Exercise Chip row ── */
  .ex-chip { display: flex; align-items: center; padding: 11px 14px; border-bottom: 1px solid rgba(39,32,16,0.8); cursor: pointer; transition: background 0.15s; gap: 10px; }
  .ex-chip:hover { background: var(--accent-dim); }
  .ex-chip-info { flex: 1; min-width: 0; }
  .ex-chip-name { font-size: 13px; font-weight: 700; color: var(--warm-white); display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-chip-vals { font-size: 13px; color: var(--accent); font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; margin-top: 2px; }
  .ex-chip-hint { font-size: 10px; color: var(--text4); margin-top: 1px; }
  .ex-chip-del { color: var(--text4); font-size: 18px; line-height: 1; padding: 4px 6px; cursor: pointer; transition: color 0.15s; flex-shrink: 0; }
  .ex-chip-del:hover { color: #f87171; }
  .ex-chip-badge { font-size: 9px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-glow); border-radius: 3px; padding: 1px 5px; }

  /* ── Exercise Picker Bottom Sheet ── */
  .sheet-overlay { position: fixed; inset: 0; z-index: 800; background: rgba(12,10,8,0.72); backdrop-filter: blur(6px); animation: fadeIn 0.2s ease; }
  .ex-picker-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 801; background: #0a0814; border-radius: 20px 20px 0 0; border-top: 1px solid rgba(192,132,252,0.2); padding-bottom: max(20px, env(safe-area-inset-bottom)); animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1); max-height: 80vh; display: flex; flex-direction: column; }
  .ex-cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 14px 10px; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .ex-cat-scroll::-webkit-scrollbar { display: none; }
  .ex-cat-chip { flex-shrink: 0; padding: 6px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .ex-cat-chip:hover, .ex-cat-chip.active { background: rgba(255,255,255,0.09); border-color: var(--chip-col,var(--accent)); color: var(--chip-col,var(--accent)); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 12px auto 0; flex-shrink: 0; }
  .ex-picker-header { padding: 14px 18px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .ex-picker-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--warm-white); letter-spacing: 0.06em; }
  .ex-picker-search-wrap { margin: 0 14px 8px; position: relative; flex-shrink: 0; }
  .ex-picker-search-wrap input { width: 100%; background: var(--bg4); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 14px 10px 38px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
  .ex-picker-search-wrap input:focus { border-color: var(--accent); }
  .ex-picker-search-wrap input::placeholder { color: var(--text4); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text4); pointer-events: none; }
  .ex-picker-list { overflow-y: auto; flex: 1; padding: 0 8px 8px; -webkit-overflow-scrolling: touch; }
  .ex-picker-item { padding: 13px 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.13s; }
  .ex-picker-item:active { background: var(--accent-dim); }
  .ex-picker-item.added { opacity: 0.35; pointer-events: none; }
  .ex-picker-name { font-size: 15px; color: var(--warm-white); font-weight: 600; }
  .ex-picker-check { color: var(--accent); font-size: 15px; }
  .ex-picker-cancel { margin: 6px 14px 0; padding: 14px; background: var(--bg4); border: 1px solid var(--border2); border-radius: 12px; color: var(--text2); font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; flex-shrink: 0; text-align: center; }

  /* ── Drum-Roll Picker Wheel ── */
  .wheel-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 901; background: #0e0c14; border-radius: 20px 20px 0 0; border-top: 1px solid rgba(245,158,11,0.14); padding-bottom: max(20px, env(safe-area-inset-bottom)); animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1); }
  .wheel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 4px; }
  .wheel-ex-label { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--warm-white); letter-spacing: 0.06em; text-align: center; padding: 0 20px 10px; }
  .wheel-done-btn { background: var(--accent); color: #000; border: none; border-radius: 9px; padding: 9px 22px; font-size: 14px; font-weight: 900; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; cursor: pointer; box-shadow: 0 2px 12px var(--accent-glow); }
  .wheel-cancel-label { font-size: 14px; color: var(--text3); cursor: pointer; padding: 4px 8px; }
  .wheels-row { display: flex; padding: 0 8px 8px; }
  .wheel-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .wheel-col-label { font-size: 9px; color: var(--text4); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; font-weight: 700; }
  .wheel-drum { height: 200px; overflow: hidden; position: relative; width: 100%; touch-action: none; }
  .wheel-drum-inner { display: flex; flex-direction: column; align-items: center; will-change: transform; }
  .wheel-item { height: 40px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text4); letter-spacing: 0.04em; width: 100%; white-space: nowrap; pointer-events: none; }
  .wheel-item.sel { color: var(--warm-white); font-size: 30px; }
  .wheel-item.near1 { color: var(--text2); font-size: 27px; }
  .wheel-item.near2 { color: var(--text3); font-size: 22px; }
  .wheel-selector-bar { position: absolute; top: 50%; left: 10px; right: 10px; height: 40px; transform: translateY(-50%); border-top: 1px solid var(--accent-glow); border-bottom: 1px solid var(--accent-glow); background: var(--accent-dim); border-radius: 6px; pointer-events: none; }
  .wheel-fade-t { position: absolute; top: 0; left: 0; right: 0; height: 72px; background: linear-gradient(to bottom, #1c1812 0%, transparent 100%); pointer-events: none; z-index: 2; }
  .wheel-fade-b { position: absolute; bottom: 0; left: 0; right: 0; height: 72px; background: linear-gradient(to top, #1c1812 0%, transparent 100%); pointer-events: none; z-index: 2; }
  .wheel-unit-label { font-size: 10px; color: var(--text3); margin-top: 5px; font-weight: 600; }

  /* Buttons */
  .save-btn { width: 100%; margin-top: 10px; background: var(--accent); color: #000; border: none; border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 900; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; cursor: pointer; box-shadow: 0 4px 24px var(--accent-glow); transition: all 0.2s; }
  .save-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .save-btn.done { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); box-shadow: none; }
  .save-btn:active { transform: scale(0.98); }

  /* Stretch cards */
  .stretch-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 14px 16px; margin-bottom: 8px; transition: all 0.25s; }
  .stretch-card.done { opacity: 0.5; border-color: var(--border); }
  .stretch-name { font-size: 14px; font-weight: 700; color: var(--warm-white); transition: color 0.2s; }
  .stretch-card.done .stretch-name { text-decoration: line-through; color: var(--text3); }
  .stretch-note { font-size: 11px; color: var(--text4); margin: 3px 0 10px; }
  .stretch-row { display: flex; justify-content: space-between; align-items: center; }
  .timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); min-width: 50px; }
  .timer-btns { display: flex; gap: 6px; }
  .timer-btn { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .timer-btn.go { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
  .timer-btn:active { transform: scale(0.95); }
  .check-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg4); color: var(--text3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; flex-shrink: 0; }
  .check-btn.checked { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

  /* Routine selector */
  .routine-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .routine-btn { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 11px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .routine-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-glow); }

  /* Progress bar */
  .stretch-prog { background: var(--bg4); border-radius: 99px; height: 4px; margin-bottom: 14px; overflow: hidden; }
  .stretch-prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; box-shadow: 0 0 8px var(--accent-glow); }

  /* PR items */
  .pr-entry { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; border-bottom: 1px solid var(--border); }
  .pr-best-val { font-size: 15px; font-weight: 700; color: var(--warm-white); }
  .pr-best-label { font-size: 10px; color: var(--accent); margin-left: 6px; }

  /* History */
  .hist-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; transition: all 0.15s; }
  .hist-card:hover { border-color: var(--border2); }

  /* Chart container */
  .chart-wrap { position: relative; height: 180px; margin-top: 8px; }

  /* Select & textarea */
  select, textarea { background: var(--bg4); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 100%; transition: border-color 0.15s; }
  select:focus, textarea:focus { border-color: var(--accent-glow); box-shadow: 0 0 12px var(--accent-dim); }
  textarea { resize: none; }
  select option { background: #1c1810; }

  /* Fade animation */
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fade { animation: fadeIn 0.22s ease; }
  @keyframes glow-pulse { 0%,100%{opacity:1} 50%{opacity:0.85} }
  .glow-pulse { animation: glow-pulse 2s ease infinite; }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,6,12,0.88); border-top: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(28px) saturate(1.5); -webkit-backdrop-filter: blur(28px) saturate(1.5); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); display: flex; justify-content: space-around; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 8px; border-radius: 10px; transition: all 0.18s; background: none; border: none; color: var(--text4); font-family: 'DM Sans', sans-serif; }
  .nav-item.active { color: var(--accent); }
  .nav-item[data-id="settings"].active { color: var(--accent); }
  .nav-icon { width: 22px; height: 22px; transition: transform 0.18s; display: flex; align-items: center; justify-content: center; }
  .nav-item:active .nav-icon { transform: scale(0.9); }
  .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Export button */
  .export-btn { background: transparent; border: 1px solid var(--border2); color: var(--text3); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .export-btn:hover { border-color: var(--accent-glow); color: var(--accent); }

<div id="app">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

  {key:"mon",label:"MON",name:"Monday",   tag:"strength",  blocks:["Back & Biceps","Shoulders A"]},

const ALL_WORKOUT_CATEGORIES = {

  // ═══════════════════════════════════════════════════════

function stoneGemSVG(stoneId, size=80) {
  // Look up by stone ID (s01..s20) — each stone has its own unique color
  const conf = STONE_CONF[stoneId] || STONE_CONF.s01;
  const isOpal = stoneId === "s19" || stoneId === "s20";
  const s = size, cx = s/2;
  const uid = stoneId+"-"+size+"-"+(Math.random()*1e6|0);
  const r = s * 0.44;
  const ri = r * 0.72;
  const pts = [
    [cx,        s*0.02],
    [cx+r*0.6,  s*0.18],
    [cx+r,      s*0.42],
    [cx+r*0.65, s*0.72],
    [cx,        s*0.98],
    [cx-r*0.65, s*0.72],
    [cx-r,      s*0.42],
    [cx-r*0.6,  s*0.18],
  ].map(p=>p.join(",")).join(" ");
  const ipts = [
    [cx,        s*0.08],
    [cx+ri*0.5, s*0.24],
    [cx,        s*0.38],
    [cx-ri*0.5, s*0.24],
  ].map(p=>p.join(",")).join(" ");

  const gradStops = conf.grad.length > 3
    ? conf.grad.map((c,i,a)=>`<stop offset="${Math.round(i/(a.length-1)*100)}%" stop-color="${c}"/>`).join("")
    : `<stop offset="0%" stop-color="${conf.grad[0]}"/><stop offset="50%" stop-color="${conf.grad[1]}"/><stop offset="100%" stop-color="${conf.grad[2]}"/>`;

  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sg-${uid}" cx="38%" cy="22%" r="70%">${gradStops}</radialGradient>
      <radialGradient id="sh-${uid}" cx="30%" cy="18%" r="45%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
      <filter id="gf-${uid}" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="${s*0.06}" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <ellipse cx="${cx}" cy="${s*0.88}" rx="${s*0.3}" ry="${s*0.055}" fill="${conf.glow}" opacity="0.5"/>
    <polygon points="${pts}" fill="url(#sg-${uid})" filter="url(#gf-${uid})"/>
    <polygon points="${ipts}" fill="rgba(255,255,255,0.22)" opacity="0.9"/>
    <ellipse cx="${cx*0.72}" cy="${s*0.19}" rx="${s*0.11}" ry="${s*0.065}" fill="url(#sh-${uid})" opacity="0.85"/>
    <line x1="${cx+r*0.85}" y1="${s*0.28}" x2="${cx+r*0.6}" y2="${s*0.55}" stroke="rgba(255,255,255,0.25)" stroke-width="${s*0.012}" stroke-linecap="round"/>
    ${isOpal ? `<line x1="${cx}" y1="${s*0.05}" x2="${cx-r*0.35}" y2="${s*0.62}" stroke="${conf.grad[0]}" stroke-width="${s*0.012}" stroke-linecap="round" opacity="0.5"/>
    <line x1="${cx}" y1="${s*0.05}" x2="${cx+r*0.28}" y2="${s*0.58}" stroke="${conf.grad[1]}" stroke-width="${s*0.009}" stroke-linecap="round" opacity="0.4"/>
    <line x1="${cx*0.6}" y1="${s*0.25}" x2="${cx+r*0.5}" y2="${s*0.65}" stroke="${conf.grad[2]||conf.grad[0]}" stroke-width="${s*0.007}" stroke-linecap="round" opacity="0.35"/>` : ""}
  </svg>`;
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────

function loadState() {
  try {
    const saved = localStorage.getItem("wt-state-v3");
    if (saved) { const parsed = JSON.parse(saved); state = {...state, ...parsed}; }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem("wt-state-v3", JSON.stringify(state)); } catch(e) {}
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "workout-backup.json"; a.click();
  URL.revokeObjectURL(url);
  showToast("&#10003; Backup downloaded!");
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      state = {...state, ...data};
      saveState(); render();
      showToast("&#10003; Data restored!");
    } catch { showToast("Invalid file"); }
  };
  reader.readAsText(file);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function getPhase(week) {
  return PHASES.find(p=>week>=p.range[0]&&week<=p.range[1])||PHASES[0];
}

function fmtSec(s) {
  const m=Math.floor(s/60), sec=s%60;
  return m>0?`${m}:${sec.toString().padStart(2,"0")}`:`${sec}s`;
}

function today() {
  return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

function pct(c,s,g) { return Math.min(100,Math.max(0,Math.round(((c-s)/(g-s))*100))); }

function getLatest(sessions, field) {
  const relevant = sessions.filter(s=>s[field]!=null);
  return relevant.length ? relevant[relevant.length-1][field] : null;
}

function bestPR(lift) {
  const arr = state.prs[lift]||[];
  return arr.length ? Math.max(...arr.map(e=>e.weight)) : null;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

// ─── DYNAMIC THEME SETTER ────────────────────────────────────────────────────

function getActiveStone() {
  const earned = state.earnedTrophies || [];
  // Use user-selected stone if valid and earned
  if (state.activeStoneId && earned.includes(state.activeStoneId)) {
    return STONE_PATH.find(s => s.id === state.activeStoneId) || STONE_PATH[0];
  }
  // Default: latest earned stone
  if (earned.length > 0) {
    // Find the highest-step earned stone
    const earnedStones = STONE_PATH.filter(s => earned.includes(s.id));
    return earnedStones[earnedStones.length - 1];
  }
  return STONE_PATH[0]; // nothing earned yet
}

function applyTheme() {
  const stone = getActiveStone();
  const conf  = STONE_CONF[stone.id] || STONE_CONF.s01;
  const root  = document.documentElement;
  root.style.setProperty('--accent',      conf.color);
  root.style.setProperty('--accent-glow', conf.glow);
  root.style.setProperty('--accent-dim',  conf.glow.replace(/[\d.]+\)$/, '0.12)'));
  root.style.setProperty('--crown-color', conf.color);
  root.style.setProperty('--crown-glow',  conf.glow);
  // Goal card colored borders match accent
  root.style.setProperty('--goal-border', conf.glow.replace(/[\d.]+\)$/, '0.2)'));
  // Body background tinted with stone color
  const haloColor = conf.glow.replace(/[\d.]+\)$/, '0.14)');
  root.style.setProperty('--crown-halo',
    `radial-gradient(ellipse at 50% 40%, ${haloColor} 0%, transparent 68%)`);
  document.body.style.backgroundImage = [
    `radial-gradient(ellipse 90% 45% at 50% -5%, ${conf.glow.replace(/[\d.]+\)$/, '0.18)')} 0%, transparent 55%)`,
    `radial-gradient(ellipse 50% 35% at 5%  95%,  ${conf.glow.replace(/[\d.]+\)$/, '0.06)')} 0%, transparent 50%)`,
    `radial-gradient(ellipse 45% 30% at 95% 90%,  ${conf.glow.replace(/[\d.]+\)$/, '0.05)')} 0%, transparent 50%)`,
    'linear-gradient(160deg,#08060a 0%,#0a080e 50%,#08060a 100%)',
  ].join(',');
}

// ─── GEM CROWN RENDERER ──────────────────────────────────────────────────────

function renderGemCrown() {
  const earned = state.earnedTrophies || [];
  const stone  = getActiveStone();
  const conf   = STONE_CONF[stone.id] || STONE_CONF.s01;
  const isEarned = earned.includes(stone.id);
  const isAllDone = earned.length === STONE_PATH.length;

  const haloEl  = document.getElementById('gem-crown-halo');
  const gemEl   = document.getElementById('gem-crown-gem');
  const labelEl = document.getElementById('gem-crown-label');
  if (!haloEl || !gemEl || !labelEl) return;

  haloEl.style.background = `radial-gradient(ellipse at 50% 40%, ${conf.glow.replace(/[\d.]+\)$/, '0.25)')} 0%, transparent 68%)`;
  gemEl.innerHTML = stoneGemSVG(stone.id, 96);
  gemEl.style.filter = `drop-shadow(0 0 28px ${conf.glow}) drop-shadow(0 0 56px ${conf.glow.replace(/[\d.]+\)$/, '0.25)')})`;

  if (isAllDone) {
    labelEl.innerHTML = `<span style="color:${conf.color}">All stones collected ✦</span>`;
  } else if (isEarned) {
    const isManual = !!state.activeStoneId;
    labelEl.innerHTML = `<span style="color:${conf.color}">${stone.name}</span><span style="color:rgba(255,255,255,0.2);font-size:9px;margin-left:6px">${isManual ? "selected" : "active"}</span>`;
  } else {
    labelEl.innerHTML = `<span style="color:rgba(255,255,255,0.25)">Next · </span><span style="color:${conf.color}">${stone.label}</span>`;
  }
}

    </span>
  `;

  const phase = getPhase(state.currentWeek);
  document.getElementById("week-display").textContent = `WK ${state.currentWeek}`;
  document.getElementById("phase-badge").textContent  = phase.name;

// ─── RECOMMENDED SECTION BUILDER ─────────────────────────────────────────────

function buildRecSection(bi, block) {
  const allRecs = RECS[block];
  if (!allRecs || !allRecs.length) return "";
  const added = ui.blockExercises[bi] || [];
  // Only show 3 at a time — cycles automatically as user adds
  const available = allRecs.filter(r => !added.includes(r.ex));
  const recs = available.slice(0, 3);
  if (!recs.length) return `<div class="rec-section"><div class="rec-header" style="color:var(--accent)">All recommendations added ✓</div></div>`;
  const cards = recs.map((r, i) => {
    const tagColor = TAG_COLORS[r.tag] || "var(--accent)";
    return `<div class="rec-card" onclick="addExerciseFromRec(${bi},'${r.ex.replace(/'/g,"\'")}')">
      <div class="rec-num">${i+1}</div>
      <div class="rec-body">
        <div class="rec-name">${r.ex}</div>
        <div class="rec-why">${r.why}</div>
        <div class="rec-meta">
          <span class="rec-scheme">${r.sets} sets · ${r.reps} reps</span>
          <span class="rec-tag" style="color:${tagColor};background:${tagColor}18">${r.tag}</span>
        </div>
      </div>
      <div class="rec-add" onclick="event.stopPropagation();addExerciseFromRec(${bi},'${r.ex.replace(/'/g,"\'")}')">+</div>
    </div>`;
  }).join("");
  return `<div class="rec-section">
    <div class="rec-header">Recommended <span style="color:var(--accent);font-size:9px">(${available.length} left)</span></div>
    ${cards}
  </div>`;
}

function addExerciseFromRec(bi, ex) {
  if (!ui.blockExercises[bi]) ui.blockExercises[bi] = [];
  if (!ui.blockExercises[bi].includes(ex)) {
    ui.blockExercises[bi].push(ex);
    if (!ui.formData[ex]) ui.formData[ex] = { weight: (ex==="Squat"||ex==="Bench Press") ? 225 : 135, sets:3, reps:8 };
    // pre-fill sets/reps from rec data
    const day = DAYS[ui.logDay];
    const blockName = day.blocks[bi];
    const rec = (RECS[blockName]||[]).find(r=>r.ex===ex);
    if (rec) {
      const repsNum = parseInt(rec.reps.split("–")[0]);
      const setsNum = parseInt(rec.sets.split("–")[0]);
      if (!isNaN(repsNum)) ui.formData[ex].reps = repsNum;
      if (!isNaN(setsNum)) ui.formData[ex].sets = setsNum;
    }
  }
  renderContent();
}

  if (!ui.blockExercises[bi]) ui.blockExercises[bi]=[];

// ─── DRUM-ROLL WHEEL PICKER ──────────────────────────────────────────────────

function openWheelPicker(ex, bi) {
  closeAllSheets();
  const vals    = ui.formData[ex]||{weight:135,sets:3,reps:8};
  const isGoal  = ex==="Squat"||ex==="Bench Press";

  // Build value arrays
  const weights = [];
  for(let w=10; w<=(isGoal?500:400); w+=5) weights.push(w);
  const sets = [1,2,3,4,5,6,7,8];
  const reps = [];
  for(let r=1; r<=30; r++) reps.push(r);

  const wIdx = Math.max(0, weights.indexOf(vals.weight));
  const sIdx = Math.max(0, sets.indexOf(vals.sets));
  const rIdx = Math.max(0, reps.indexOf(vals.reps));

  const overlay = document.createElement("div");
  overlay.className = "sheet-overlay";
  overlay.id = "wheel-overlay";
  overlay.onclick = e=>{ if(e.target===overlay) closeAllSheets(); };

  overlay.innerHTML = `
    <div class="wheel-sheet" id="wheel-sheet">
      <div class="sheet-handle"></div>
      <div class="wheel-header">
        <span class="wheel-cancel-label" onclick="closeAllSheets()">Cancel</span>
        <button class="wheel-done-btn" onclick="commitWheel('${ex.replace(/'/g,"\\'")}',${bi})">DONE</button>
      </div>
      <div class="wheel-ex-label">${ex}</div>
      <div class="wheels-row">
        ${buildWheelCol("whl-weight", "Weight", weights, wIdx, "lbs")}
        ${buildWheelCol("whl-sets",   "Sets",   sets,    sIdx, "")}
        ${buildWheelCol("whl-reps",   "Reps",   reps,    rIdx, "")}
      </div>
    </div>`;

  document.body.appendChild(overlay);

  // Init drag behaviour after mount
  requestAnimationFrame(()=>{
    ["whl-weight","whl-sets","whl-reps"].forEach(id=>initWheelDrum(id));
  });
}

function buildWheelCol(id, label, items, selIdx, unit) {
  const VISIBLE = 5;
  const PAD = Math.floor(VISIBLE/2);
  const all = [...Array(PAD).fill(""), ...items, ...Array(PAD).fill("")];
  const offsetIdx = selIdx + PAD;
  return `
    <div class="wheel-col">
      <div class="wheel-col-label">${label}</div>
      <div class="wheel-drum" id="${id}" data-items='${JSON.stringify(items)}' data-idx="${selIdx}">
        <div class="wheel-drum-inner" id="${id}-inner" style="transform:translateY(${(PAD-selIdx)*40}px)">
          ${all.map((v,i)=>{
            const dist = Math.abs(i - offsetIdx);
            const cls  = dist===0?"sel":dist===1?"near1":dist===2?"near2":"";
            return `<div class="wheel-item${cls?" "+cls:""}">${v===""?"":v}</div>`;
          }).join("")}
        </div>
        <div class="wheel-selector-bar"></div>
        <div class="wheel-fade-t"></div>
        <div class="wheel-fade-b"></div>
      </div>
      ${unit?`<div class="wheel-unit-label">${unit}</div>`:""}
    </div>`;
}

function initWheelDrum(id) {
  const drum  = document.getElementById(id);
  if (!drum) return;
  const inner = document.getElementById(id+"-inner");
  const items = JSON.parse(drum.dataset.items);
  const PAD   = 2;
  let curIdx  = parseInt(drum.dataset.idx)||0;
  let startY  = 0;
  let startOff= 0;
  let curOff  = (PAD - curIdx) * 40;

  function getOffset(idx) { return (PAD - idx) * 40; }

  function applyTransform(off, animate) {
    inner.style.transition = animate ? "transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)" : "none";
    inner.style.transform  = `translateY(${off}px)`;
  }

  function updateClasses(idx) {
    const all = inner.querySelectorAll(".wheel-item");
    all.forEach((el, i) => {
      const dist = Math.abs(i - (idx + PAD));
      el.className = "wheel-item" + (dist===0?" sel":dist===1?" near1":dist===2?" near2":"");
    });
    drum.dataset.idx = idx;
  }

  function snapTo(idx) {
    idx = Math.max(0, Math.min(items.length-1, idx));
    curIdx = idx;
    curOff = getOffset(idx);
    applyTransform(curOff, true);
    updateClasses(idx);
    if (navigator.vibrate) navigator.vibrate(8);
  }

  // Touch
  drum.addEventListener("touchstart", e=>{
    startY   = e.touches[0].clientY;
    startOff = curOff;
    inner.style.transition = "none";
  }, {passive:true});

  drum.addEventListener("touchmove", e=>{
    const dy = e.touches[0].clientY - startY;
    curOff   = startOff + dy;
    applyTransform(curOff, false);
    // live class update
    const rawIdx = PAD - curOff/40;
    updateClasses(Math.round(Math.max(0,Math.min(items.length-1,rawIdx))));
  }, {passive:true});

  drum.addEventListener("touchend", e=>{
    const dy  = e.changedTouches[0].clientY - startY;
    const raw = PAD - (startOff+dy)/40;
    snapTo(Math.round(raw));
  }, {passive:true});

  // Mouse (desktop)
  drum.addEventListener("mousedown", e=>{
    startY   = e.clientY;
    startOff = curOff;
    inner.style.transition = "none";
    const onMove = ev=>{
      const dy = ev.clientY - startY;
      curOff   = startOff + dy;
      applyTransform(curOff, false);
      const rawIdx = PAD - curOff/40;
      updateClasses(Math.round(Math.max(0,Math.min(items.length-1,rawIdx))));
    };
    const onUp = ev=>{
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      const dy  = ev.clientY - startY;
      const raw = PAD - (startOff+dy)/40;
      snapTo(Math.round(raw));
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  // Scroll wheel
  drum.addEventListener("wheel", e=>{
    e.preventDefault();
    snapTo(curIdx + (e.deltaY > 0 ? 1 : -1));
  }, {passive:false});
}

function commitWheel(ex, bi) {
  const wDrum = document.getElementById("whl-weight");
  const sDrum = document.getElementById("whl-sets");
  const rDrum = document.getElementById("whl-reps");
  if (!wDrum||!sDrum||!rDrum) { closeAllSheets(); return; }

  const weights = JSON.parse(wDrum.dataset.items);
  const sets    = JSON.parse(sDrum.dataset.items);
  const reps    = JSON.parse(rDrum.dataset.items);

  const w = weights[parseInt(wDrum.dataset.idx)||0];
  const s = sets[parseInt(sDrum.dataset.idx)||0];
  const r = reps[parseInt(rDrum.dataset.idx)||0];

  if (!ui.formData[ex]) ui.formData[ex]={weight:135,sets:3,reps:8};
  ui.formData[ex].weight = w;
  ui.formData[ex].sets   = s;
  ui.formData[ex].reps   = r;

  closeAllSheets();
  renderContent();
}

// ── 3-rec cycling system for stretches ──────────────────────────────────────
function buildStretchRecSection(bi, blockName) {
  const recCats   = STRETCH_RECS[blockName] || [Object.keys(ALL_STRETCH_CATEGORIES)[0]];
  const added     = ui.stretchBlocks[bi] || [];

  // Pool: take up to 3 recs, cycling in new ones as the user adds them
  let pool = [];
  recCats.forEach(catName => {
    const cat = ALL_STRETCH_CATEGORIES[catName];
    if (cat) pool.push(...cat.stretches);
  });

  // Remove already-added, then show 3 at a time
  const available = pool.filter(s => !added.includes(s.name));
  const recs      = available.slice(0, 3);
  if (!recs.length) return "";

  const cards = recs.map((s, i) => {
    return `<div class="rec-card" onclick="addStretchFromRec(${bi},'${s.name.replace(/'/g,"\'")}')">
      <div class="rec-num">${i+1}</div>
      <div class="rec-body">
        <div class="rec-name">${s.name}</div>
        <div class="rec-why">${s.note}</div>
        <div class="rec-meta">
          <span class="rec-scheme">${fmtSec(s.dur)} hold</span>
        </div>
      </div>
      <div class="rec-add" onclick="event.stopPropagation();addStretchFromRec(${bi},'${s.name.replace(/'/g,"\'")}')">+</div>
    </div>`;
  }).join("");

  return `<div class="rec-section">
    <div class="rec-header">Recommended</div>
    ${cards}
  </div>`;
}

function addStretchFromRec(bi, name) {
  if (!ui.stretchBlocks[bi]) ui.stretchBlocks[bi] = [];
  if (!ui.stretchBlocks[bi].includes(name)) {
    ui.stretchBlocks[bi].push(name);
  }
  renderContent();
}

// ─── TROPHY SYSTEM ────────────────────────────────────────────────────────────

function getEarnedIds() { return state.earnedTrophies || []; }

function checkTrophies() {
  if (!state.earnedTrophies) state.earnedTrophies = [];
  const earned = state.earnedTrophies;
  const newlyEarned = [];

  // Non-linear: each stone checks its own milestone independently
  STONE_PATH.forEach(stone => {
    if (earned.includes(stone.id)) return;
    try {
      if (stone.check(state)) {
        earned.push(stone.id);
        newlyEarned.push(stone);
      }
    } catch(e) {}
  });

  if (newlyEarned.length) {
    saveState();
    // Queue modals one at a time, show highest tier first
    const tierOrder = ["opal","rose","emerald","sapphire","amber","ruby","smoke"];
    newlyEarned.sort((a,b) => tierOrder.indexOf(a.tier) - tierOrder.indexOf(b.tier));
    let delay = 0;
    newlyEarned.forEach(stone => {
      setTimeout(() => showStoneModal(stone), delay);
      delay += 600;
    });
  }
}

function setActiveStone(id) {
  const earned = state.earnedTrophies || [];
  if (!earned.includes(id)) return; // can't select unearned
  state.activeStoneId = (state.activeStoneId === id) ? null : id; // toggle off = auto
  saveState();
  applyTheme();
  renderGemCrown();
  renderTrophies();
  renderHeader();
}

  // ── Active theme gem hero ─────────────────────────────────────────────

      ${earned.includes(active.id)
        ? `<div class="stone-hero-done" style="color:${activeConf.color}">✓ ${state.activeStoneId ? "Selected" : "Latest"}</div>`

  html += `

      </div>
      <div class="stone-prog-bar">
        <div class="stone-prog-fill" style="width:${pct}%;background:${activeConf.color};box-shadow:0 0 8px ${activeConf.glow}"></div>
      </div>
    </div>`;

  // ── Theme picker — earned stones ─────────────────────────────────────
  if (count > 0) {
    html += `<div class="stone-picker-section">`;
    html += `<div class="stone-picker-title">Choose Your Theme</div>`;
    html += `<div class="stone-picker-grid">`;
    STONE_PATH.forEach(stone => {
      const isEarned  = earned.includes(stone.id);
      const isActive  = active.id === stone.id;
      const conf      = STONE_CONF[stone.id] || STONE_CONF.s01;
      const gemSize   = 40;
      html += `
        <div class="stone-pick-btn ${isEarned?"":"locked"} ${isActive?"active":""}"
             style="${isActive?`--pick-color:${conf.color};--pick-glow:${conf.glow}`:""}"
             onclick="${isEarned?`setActiveStone('${stone.id}')`:""}"
             title="${stone.name}">
          ${isActive ? `<div class="stone-pick-check">✓</div>` : ""}
          ${stoneGemSVG(stone.id, gemSize)}
          <div class="stone-pick-label">${stone.name}</div>
        </div>`;
    });
    html += `</div>`;
    if (state.activeStoneId) {
      html += `<button onclick="state.activeStoneId=null;saveState();applyTheme();renderGemCrown();renderTrophies();renderHeader();" style="margin-top:12px;width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;">Reset to Auto (Latest Stone)</button>`;
    }
    html += `</div>`;
  }

  // ── Divider ──────────────────────────────────────────────────────────
  html += `<div style="padding:0 16px"><div style="height:1px;background:rgba(255,255,255,0.06);margin:4px 0 20px"></div></div>`;

  // ── All stones list ─────────────────────────────────────────────────
  html += `<div class="stone-list">`;
  STONE_PATH.forEach((stone, i) => {
    const isEarned = earned.includes(stone.id);
    const isActive = active.id === stone.id && !isEarned; // only highlight as "next" if not earned
    const conf     = STONE_CONF[stone.id] || STONE_CONF.s01;
    const rowClass = isEarned ? "earned" : isActive ? "next-up" : "locked";
    const gemSize  = 36;

    if (i > 0) {
      html += `<div class="stone-conn${isEarned ? " lit" : ""}"></div>`;
    }

    html += `
      <div class="stone-row ${rowClass}"
           style="${isEarned ? `cursor:pointer;` : ""}${isEarned && active.id===stone.id ? `box-shadow:0 0 0 2px ${conf.color},0 0 24px ${conf.glow.replace(/[\d.]+\)$/,"0.2)")};` : ""}"
           onclick="${isEarned ? `setActiveStone('${stone.id}')` : ""}">
        <div class="stone-row-gem"
             style="${isEarned
               ? `filter:drop-shadow(0 0 8px ${conf.glow});`
               : "filter:grayscale(1) brightness(0.35)"}">
          ${stoneGemSVG(stone.id, gemSize)}
        </div>
        <div class="stone-row-body">
          <div class="stone-row-name" style="${isEarned?`color:${conf.color}`:""}">${stone.name}</div>
          <div class="stone-row-sub">${isEarned ? `✓ Collected · Tap to use` : stone.label}</div>
        </div>
        <div class="stone-row-num" style="${isEarned&&active.id===stone.id?`color:${conf.color};font-size:14px`:""}">
          ${isEarned && active.id===stone.id ? "◆" : stone.step}
        </div>
      </div>`;
  });
  html += `</div></div>`;

  document.getElementById("content").innerHTML = html;
}

// ─── RENDER BODYWEIGHT ───────────────────────────────────────────────────────

function renderBW() {
  const bw=state.bodyweights;
  const latest=bw.length?bw[bw.length-1].weight:null;
  const diff=bw.length>1?+(latest-bw[0].weight).toFixed(1):null;

  let html=`
    <div class="card glowing">
      <div class="bebas card-title" style="display:flex;align-items:center;gap:8px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Body Weight</div>
      ${sliderHTML("bw","Body Weight",100,400,0.5,ui.bwValue," lbs","ui.bwValue=parseFloat(this.value)")}
      <button class="save-btn bebas" id="save-bw-btn" onclick="saveBW()" style="margin-top:16px">SAVE WEIGHT</button>
    </div>
  `;

  if(bw.length>0) {
    html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
      ${[["Current",latest+" lbs"],["Change",diff!=null?(diff>0?"+":"")+diff+" lbs":"—"],["Entries",bw.length]].map(([l,v])=>`
        <div class="card" style="padding:12px 14px;margin-bottom:0">
          <div class="sec-label">${l}</div>
          <div class="bebas" style="font-size:20px;color:var(--accent)">${v}</div>
        </div>`).join("")}
    </div>`;
  }

  if(bw.length>1) {
    html+=`<div class="card">
      <div class="bebas" style="font-size:17px;color:var(--warm-white);margin-bottom:14px">Body Weight Trend</div>
      <div class="chart-wrap"><canvas id="bw-chart"></canvas></div>
    </div>`;
  }

  if(bw.length>0) {
    html+=`<div class="card" style="padding:0;overflow:hidden">
      <div style="background:var(--bg4);border-bottom:1px solid var(--border);padding:12px 16px;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--warm-white)">Weight Log</div>
      ${[...bw].reverse().map(e=>`<div class="pr-entry"><span class="bebas" style="font-size:16px;color:var(--accent)">${e.weight} lbs</span><span style="font-size:11px;color:var(--text4)">Wk ${e.week} · ${e.date}</span></div>`).join("")}
    </div>`;
  }

  if(!bw.length) html+=`<div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="bebas empty-title">No Weigh-Ins Yet</div></div>`;

  document.getElementById("content").innerHTML=html;

  if(bw.length>1) setTimeout(()=>{
    const ctx=document.getElementById("bw-chart");
    if(!ctx) return;
    new Chart(ctx,{type:"line",data:{labels:bw.map((_,i)=>`#${i+1}`),datasets:[{data:bw.map(e=>e.weight),borderColor:getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),backgroundColor:"rgba(255,255,255,0.03)",borderWidth:2,pointBackgroundColor:getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),pointRadius:4,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw} lbs`},backgroundColor:"#1c1810",bodyColor:"#f5ead8",borderColor:"rgba(245,158,11,0.2)",borderWidth:1}},scales:{x:{ticks:{color:"#4a3c25",font:{size:10}},grid:{color:"rgba(39,32,16,0.6)"}},y:{ticks:{color:"#4a3c25",font:{size:10}},grid:{color:"rgba(39,32,16,0.6)"},min:Math.min(...bw.map(e=>e.weight))-5,max:Math.max(...bw.map(e=>e.weight))+5}}}});
  },50);
}

function saveBW() {
  state.bodyweights.push({weight:ui.bwValue,date:today(),week:state.currentWeek});
  saveState(); renderHeader();
  showToast("&#10003; Weight saved!");
  const btn=document.getElementById("save-bw-btn");
  if(btn){btn.textContent="&#10003; SAVED!";btn.classList.add("done");setTimeout(()=>renderContent(),1500);}
  checkTrophies();
}

// ─── RENDER CHARTS ───────────────────────────────────────────────────────────

function renderCharts() {
  const squatData=state.sessions.filter(s=>s.lifts?.Squat?.weight).map(s=>({x:`Wk ${s.week}`,y:s.lifts.Squat.weight}));
  const benchData=state.sessions.filter(s=>s.lifts?.["Bench Press"]?.weight).map(s=>({x:`Wk ${s.week}`,y:s.lifts["Bench Press"].weight}));
  const runData=state.sessions.filter(s=>s.runMiles!=null).map(s=>({x:`Wk ${s.week}`,y:s.runMiles}));

  if(!squatData.length&&!benchData.length&&!runData.length&&state.bodyweights.length<2) {
    document.getElementById("content").innerHTML=`<div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="bebas empty-title">No Data Yet</div><div class="empty-sub">Log sessions to see your growth</div></div>`;
    return;
  }

  // Use CSS accent variable for chart colors
  const accentRaw = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#f59e0b';
  const chartDefs=[
    {id:"squat-chart",title:"Squat Progress",data:squatData,unit:" lbs",goal:315,color:accentRaw,gainStart:225},
    {id:"bench-chart",title:"Bench Progress",data:benchData,unit:" lbs",goal:250,color:accentRaw,gainStart:205},
    {id:"run-chart",title:"Running Progress",data:runData,unit:" mi",goal:5,color:accentRaw,gainStart:2.5},
  ].filter(c=>c.data.length>0);

  document.getElementById("content").innerHTML=chartDefs.map(c=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="bebas" style="font-size:18px;color:var(--warm-white)">${c.title}</div>
        ${c.data.length?`<div style="background:var(--accent-dim);border:1px solid var(--accent-glow);color:var(--accent);border-radius:7px;padding:3px 10px;font-size:11px;font-weight:700">+${+(c.data[c.data.length-1].y-c.gainStart).toFixed(1)}${c.unit}</div>`:""}
      </div>
      <div style="font-size:11px;color:var(--text4);margin-bottom:12px">Goal: ${c.goal}${c.unit}</div>
      <div class="chart-wrap"><canvas id="${c.id}"></canvas></div>
    </div>
  `).join("")+(state.bodyweights.length>1?`<div class="card"><div class="bebas" style="font-size:18px;color:var(--warm-white);margin-bottom:12px">Body Weight</div><div class="chart-wrap"><canvas id="bw-chart2"></canvas></div></div>`:"");

  setTimeout(()=>{
    const chartOpts=(unit,min,max,goalY,color)=>({
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}${unit}`},backgroundColor:"#0e0c12",titleColor:"rgba(255,255,255,0.4)",bodyColor:"#fff",borderColor:getComputedStyle(document.documentElement).getPropertyValue('--accent-glow').trim()||"rgba(245,158,11,0.2)",borderWidth:1}},
      scales:{x:{ticks:{color:"#4a3c25",font:{size:10}},grid:{color:"rgba(39,32,16,0.6)"}},y:{ticks:{color:"#4a3c25",font:{size:10}},grid:{color:"rgba(39,32,16,0.6)"},min:min,max:max,
        afterDataLimits:scale=>{if(goalY){scale.max=Math.max(scale.max,goalY*1.02);scale.min=Math.min(scale.min,min);}}
      }},
    });

    chartDefs.forEach(c=>{
      const el=document.getElementById(c.id); if(!el) return;
      const vals=c.data.map(d=>d.y);
      const mn=Math.min(...vals)*0.97, mx=Math.max(Math.max(...vals)*1.03,c.goal*1.01);
      new Chart(el,{type:"line",data:{
        labels:c.data.map(d=>d.x),
        datasets:[
          {data:c.data.map(d=>d.y),borderColor:c.color,backgroundColor:"rgba(255,255,255,0.03)",borderWidth:2.5,pointBackgroundColor:accentRaw,pointRadius:4,tension:0.3},
          {data:c.data.map(()=>c.goal),borderColor:"rgba(255,255,255,0.12)",borderDash:[5,5],borderWidth:1,pointRadius:0,label:"Goal"},
        ]
      },options:chartOpts(c.unit,mn,mx,c.goal,c.color)});
    });

    if(state.bodyweights.length>1) {
      const el=document.getElementById("bw-chart2"); if(!el) return;
      const bw=state.bodyweights;
      new Chart(el,{type:"line",data:{labels:bw.map((_,i)=>`#${i+1}`),datasets:[{data:bw.map(e=>e.weight),borderColor:"rgba(245,158,11,0.8)",backgroundColor:"rgba(245,158,11,0.03)",borderWidth:2,pointBackgroundColor:"rgba(245,158,11,0.9)",pointRadius:3,tension:0.3}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} lbs`},backgroundColor:"#1c1810",bodyColor:"#f5ead8",borderColor:"rgba(245,158,11,0.2)",borderWidth:1}},scales:{x:{ticks:{color:"#4a3c25",font:{size:10}},grid:{color:"rgba(39,32,16,0.6)"}},y:{ticks:{color:"#4a3c25",font:{size:10}},grid:{color:"rgba(39,32,16,0.6)"}}}}});
    }
  },60);
}

// ─── RENDER HISTORY ──────────────────────────────────────────────────────────

function renderHistory() {
  if(!state.sessions.length) {
    document.getElementById("content").innerHTML=`<div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="bebas empty-title">No Sessions Yet</div></div>`;
    return;
  }

  // Import button
  let html=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
    <label class="import-label" for="import-file"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Restore Backup</label>
    <input type="file" id="import-file" accept=".json" onchange="importData(this.files[0])"/>
    <span style="font-size:11px;color:#333">${state.sessions.length} sessions total</span>
  </div>`;

  html+=[...state.sessions].reverse().map(s=>{
    const d=DAYS.find(d=>d.key===s.day);
    return `<div class="hist-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
            <span class="bebas" style="font-size:15px;color:var(--warm-white)">${s.dayName}</span>
            <span style="font-size:10px;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow);border-radius:4px;padding:2px 7px">Week ${s.week}</span>
            <span style="font-size:10px;color:var(--text4)">${s.date}</span>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            ${s.runMiles?`<span style="font-size:12px;color:var(--accent)">${s.runMiles} mi</span>`:""}
            ${s.lifts?.Squat?.weight?`<span style="font-size:12px;color:var(--text2)">Squat ${s.lifts.Squat.weight} lbs ${s.lifts.Squat.sets}×${s.lifts.Squat.reps}</span>`:""}
            ${s.lifts?.["Bench Press"]?.weight?`<span style="font-size:12px;color:var(--text2)">Bench ${s.lifts["Bench Press"].weight} lbs ${s.lifts["Bench Press"].sets}×${s.lifts["Bench Press"].reps}</span>`:""}
            ${s.notes?`<span style="font-size:11px;color:var(--text4);font-style:italic">"${s.notes}"</span>`:""}
          </div>
        </div>
        <button class="del-btn" onclick="deleteSession(${s.id})">&times;</button>
      </div>
    </div>`;
  }).join("");

  document.getElementById("content").innerHTML=html;
}

function deleteSession(id) {
  state.sessions=state.sessions.filter(s=>s.id!==id);
  saveState(); renderHeader(); renderContent();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderContent() {
  const content=document.getElementById("content");
  content.innerHTML="";
  switch(ui.tab) {
    case "log":      renderLog();      break;
    case "stretch":  renderStretch();  break;
    case "prs":      renderPRs();      break;
    case "bw":       renderBW();       break;
    case "charts":   renderCharts();   break;
    case "history":  renderHistory();  break;
    case "trophies":  renderTrophies();  break;
    case "settings":  renderSettings();  break;
  }
}

function renderSettings() {
  const goals = state.goals || [];
  const GOAL_TYPES = [
    {key:"squat",   label:"Squat",        unit:"lbs", color:"back",     start:135},
    {key:"bench",   label:"Bench",        unit:"lbs", color:"chest",    start:95},
    {key:"deadlift",label:"Deadlift",     unit:"lbs", color:"back",     start:185},
    {key:"ohp",     label:"Overhead Press",unit:"lbs",color:"shoulder", start:65},
    {key:"run",     label:"Run",          unit:"mi",  color:"run",      start:1},
    {key:"bw",      label:"Body Weight",  unit:"lbs", color:"run",      start:150},
  ];
  const COLOR_MAP = {};

  let html = `<div style="padding:0 0 20px">`;

  // ── Goals section ──────────────────────────────────────────────────────
  html += `<div class="settings-label">Your Goals</div>`;

  goals.forEach((g, i) => {
    html += `
      <div class="goal-editor">
        <div class="goal-editor-top">
          <div class="goal-color-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent-glow)"></div>
          <div class="goal-editor-label">${g.label}</div>
          <button class="del-goal-btn" onclick="deleteGoal(${i})" title="Remove goal">×</button>
        </div>
        <div class="goal-editor-fields">
          <div class="goal-field">
            <div class="goal-field-label">Start</div>
            <input type="number" value="${g.start}" onchange="updateGoal(${i},'start',+this.value)"/>
            <div class="goal-field-unit">${g.unit}</div>
          </div>
          <div class="goal-field">
            <div class="goal-field-label">Current</div>
            <input type="number" value="${g.current}" onchange="updateGoal(${i},'current',+this.value)"/>
            <div class="goal-field-unit">${g.unit}</div>
          </div>
          <div class="goal-field">
            <div class="goal-field-label">Target</div>
            <input type="number" value="${g.target}" onchange="updateGoal(${i},'target',+this.value)"/>
            <div class="goal-field-unit">${g.unit}</div>
          </div>
        </div>
      </div>`;
  });

  // ── Add goal ───────────────────────────────────────────────────────────
  html += `<div class="settings-label">Add a Goal</div>`;
  html += `<div class="goal-type-picker">`;
  GOAL_TYPES.forEach(gt => {
    const alreadyAdded = goals.some(g=>g.key===gt.key);
    html += `<div class="goal-type-chip${alreadyAdded?" selected":""}" onclick="${alreadyAdded?"":"addGoal('"+gt.key+"')"}">${gt.label}${alreadyAdded?" ✓":""}</div>`;
  });
  html += `</div>`;

  // ── Training split ─────────────────────────────────────────────────────
  html += `<div class="settings-label">Export & Backup</div>`;
  html += `
    <div class="card" style="display:flex;gap:10px">
      <button class="save-btn bebas" onclick="exportData()" style="margin-top:0;flex:1">Export Backup</button>
      <label class="save-btn bebas" for="import-file-s" style="margin-top:0;flex:1;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center">Restore Backup</label>
      <input type="file" id="import-file-s" accept=".json" onchange="importData(this.files[0])" style="display:none"/>
    </div>`;

  // ── Danger zone ────────────────────────────────────────────────────────
  html += `<div class="settings-label">Danger Zone</div>`;
  html += `
    <div class="settings-danger">
      <div>
        <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.7)">Reset All Data</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">Clears all sessions, PRs, and progress</div>
      </div>
      <button class="settings-danger-btn" onclick="if(confirm('Reset everything? This cannot be undone.')){state={sessions:[],prs:{},bodyweights:[],stretchLog:[],currentWeek:1,earnedTrophies:[],goals:state.goals};saveState();render();showToast('Data cleared')}">Reset</button>
    </div>`;

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function updateGoal(i, field, val) {
  if (!state.goals[i]) return;
  state.goals[i][field] = val;
  saveState();
  renderHeader();
}

function deleteGoal(i) {
  state.goals.splice(i, 1);
  saveState();
  renderHeader();
  renderContent();
}

function addGoal(key) {
  const GOAL_TYPES = [
    {key:"squat",   label:"Squat",        unit:"lbs", color:"back",     start:135, current:225, target:315},
    {key:"bench",   label:"Bench",        unit:"lbs", color:"chest",    start:95,  current:205, target:250},
    {key:"deadlift",label:"Deadlift",     unit:"lbs", color:"back",     start:185, current:225, target:405},
    {key:"ohp",     label:"Overhead Press",unit:"lbs",color:"shoulder", start:65,  current:95,  target:185},
    {key:"run",     label:"Run",          unit:"mi",  color:"run",      start:1,   current:2.5, target:5},
    {key:"bw",      label:"Body Weight",  unit:"lbs", color:"run",      start:150, current:180, target:165},
  ];
  const gt = GOAL_TYPES.find(t=>t.key===key);
  if (!gt || (state.goals||[]).some(g=>g.key===key)) return;
  if (!state.goals) state.goals = [];
  state.goals.push({...gt});
  saveState();
  renderHeader();
  renderContent();
}

function render() {
  renderHeader();
  renderNav();
  renderContent();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

loadState();
// Apply stone theme immediately so buttons render with correct color
if (!state.goals || !state.goals.length) {
  state.goals = [
    {key:"squat", label:"Squat", unit:"lbs", start:135, current:225, target:315, color:"back"},
    {key:"bench", label:"Bench", unit:"lbs", start:95,  current:205, target:250, color:"chest"},
    {key:"run",   label:"Run",   unit:"mi",  start:1,   current:2.5, target:5,   color:"run"},
  ];
}
applyTheme();
checkTrophies();
render();
</script>
</body>
</html>
